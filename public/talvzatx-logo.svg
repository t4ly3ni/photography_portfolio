<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">TelvzaTV Logo</title>
  <desc id="desc">TelvzaTV logo placeholder used as a thumbnail background</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#06121b" />
      <stop offset="50%" stop-color="#0a2f45" />
      <stop offset="100%" stop-color="#123f57" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f2b705" />
      <stop offset="100%" stop-color="#f9d66b" />
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <circle cx="1160" cy="100" r="220" fill="#ffffff" opacity="0.08" />
  <circle cx="180" cy="600" r="240" fill="#ffffff" opacity="0.06" />

  <rect x="140" y="235" width="1000" height="250" rx="24" fill="#031018" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.2" />
  <rect x="172" y="267" width="8" height="186" fill="url(#accent)" />

  <text x="212" y="338" fill="#f7fbff" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="2">
    TELVZATV
  </text>
  <text x="214" y="404" fill="#c8dae5" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="500" letter-spacing="4">
    MEDIA NETWORK
  </text>

  <rect x="214" y="435" width="360" height="14" rx="7" fill="url(#accent)" />
</svg>
